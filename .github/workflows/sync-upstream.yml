name: Sync upstream safely

on:
  schedule:
    - cron: "23 3 * * *"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  issues: write

concurrency:
  group: sync-upstream
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout fork
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Add upstream
        run: |
          git remote add upstream https://github.com/EverMind-AI/EverOS.git
          git fetch upstream main --tags
          git fetch origin main

      - name: Check upstream delta
        id: delta
        run: node .github/scripts/classify-upstream-sync.mjs

      - name: Create sync branch
        if: steps.delta.outputs.has_updates == 'true'
        run: |
          git checkout -B chore/sync-upstream origin/main
          git merge --no-edit upstream/main
          git push --force-with-lease origin chore/sync-upstream

      - name: Open or update review PR
        if: steps.delta.outputs.has_updates == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const head = `${owner}:chore/sync-upstream`;
            const major = process.env.SYNC_MAJOR === "true";
            const pulls = await github.rest.pulls.list({
              owner,
              repo,
              state: "open",
              head,
              base: "main",
            });
            const body = [
              major
                ? "Upstream has updates that look significant. Review and merge manually."
                : "Upstream has a small update. Review is still recommended before merging.",
              "",
              "Review signals:",
              process.env.SYNC_REASON || "- See changed files in this PR.",
              "",
              major
                ? "This PR intentionally requires human confirmation."
                : "This PR is a low-risk sync candidate, but it is not merged automatically.",
            ].join("\n");
            if (pulls.data.length) {
              await github.rest.pulls.update({
                owner,
                repo,
                pull_number: pulls.data[0].number,
                title: major ? "Sync upstream: review required" : "Sync upstream: low-risk update",
                body,
              });
            } else {
              await github.rest.pulls.create({
                owner,
                repo,
                title: major ? "Sync upstream: review required" : "Sync upstream: low-risk update",
                head: "chore/sync-upstream",
                base: "main",
                body,
              });
            }
        env:
          SYNC_MAJOR: ${{ steps.delta.outputs.major }}
          SYNC_REASON: ${{ steps.delta.outputs.reason }}
